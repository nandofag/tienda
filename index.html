<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Byte | Tienda Online</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-code"></i>
                <span>URBAN <strong>BYTE</strong></span>
            </div>
            <div class="cart-icon-container" id="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count">0</span>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero" id="hero-section">
            <h1>Descubre la Colección 2026</h1>
            <p>La mejor selección de productos con la esencia de Urban Byte.</p>
        </section>

        <section class="filters">
            <button class="filter-btn active" data-category="all">Todos</button>
            <button class="filter-btn" data-category="men's clothing">Caballeros</button>
            <button class="filter-btn" data-category="women's clothing">Damas</button>
            <button class="filter-btn" data-category="jewelery">Joyería</button>
            <button class="filter-btn" data-category="electronics">Electrónica</button>
        </section>

        <section id="products-container" class="products-grid">
            <div class="loader-container">
                <div class="spinner"></div>
                <p>Cargando productos...</p>
            </div>
        </section>
    </main>

    <!-- Modal del Carrito -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Tu Carrito</h2>
                <span class="close-modal" id="close-modal">&times;</span>
            </div>
            <div id="cart-items-container" class="cart-items-list">
                <!-- Items del carrito -->
                <p class="empty-msg">El carrito está vacío</p>
            </div>
            <div class="modal-footer">
                <div class="total-container">
                    <span>Total:</span>
                    <span id="cart-total">$0.00</span>
                </div>
                <button id="checkout-btn" class="primary-btn">Finalizar Compra</button>
                <button id="clear-cart-btn" class="secondary-btn">Vaciar Carrito</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Urban Byte. Proyecto para curso de JavaScript.</p>
    </footer>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/main.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
